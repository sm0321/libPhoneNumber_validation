plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.googlecode.libphonenumber:libphonenumber:8.13.2'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
}

test {
    useJUnitPlatform()
}