name: Phone Validation CI

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'  # 매주 월요일 오전 11시 (한국시간 기준)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 테스트 실행
        run: ./gradlew test

      - name: 변경 감지
        run: |
          if grep -r "⚠️ CHANGE" .; then
            echo "DIFF_FOUND=true" >> $GITHUB_ENV
          fi

      - name: Slack 알림
        if: env.DIFF_FOUND == 'true'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"⚠️ libphonenumber validation changed!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}