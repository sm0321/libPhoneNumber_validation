name: libphonenumber CI

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew
      - run: ./gradlew test

      # =========================
      # 1️⃣ diff 읽기
      # =========================
      - name: Load diff
        id: diff
        run: |
          if [ -f build/snapshot/diff.json ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      # =========================
      # 2️⃣ Slack 알림
      # =========================
      - name: Slack notify (pretty)
        if: env.CHANGED == 'true'
        run: |
          # 🔥 요약 정보만 추출
          COUNT=$(jq '.changes_count' build/snapshot/diff.json)

          SAMPLE=$(jq -c '.changes[:3]' build/snapshot/diff.json)

          PR_URL="${{ github.event.pull_request.html_url }}"
          if [ -z "$PR_URL" ]; then
            PR_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          PAYLOAD=$(jq -n \
            --arg pr "$PR_URL" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg count "$COUNT" \
            --arg sample "$SAMPLE" \
            '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📞 libphonenumber 변경 감지"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n\($repo)"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n\($actor)"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔢 변경 개수:* \($count)"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pull Request:*\n<\($pr)|바로가기>"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*📊 변경 일부 (최대 3개)*\n```json\n\($sample)\n```"
                  }
                }
              ]
            }')

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD"
      # =========================
      # 3️⃣ PR 생성
      # =========================
      - name: Create PR
        if: true #env.CHANGED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: libphonenumber change detected"
          title: "🚨 libphonenumber change detected"
          body: |
            ## Snapshot Diff

            ```json
            $(cat build/snapshot/diff.json)
            ```
          base: master
          delete-branch: true

      # =========================
      # 4️⃣ PR 댓글
      # =========================
      - name: PR comment
        if: github.event_name == 'pull_request' && env.CHANGED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let diff;
            try {
              diff = fs.readFileSync('build/snapshot/diff.json', 'utf8');
            } catch (e) {
              diff = "diff.json not found";
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 libphonenumber change detected\n\n\`\`\`json\n${diff}\n\`\`\``
            });