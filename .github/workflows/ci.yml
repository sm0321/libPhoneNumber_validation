name: libphonenumber CI

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew
      # GoldenTest는 로컬/전체 빌드에서만 실행하고, CI에서는 스냅샷 회귀만 실행
      - run: ./gradlew test --tests SnapshotTest

      # =========================
      # 1️⃣ diff 읽기
      # =========================
      - name: Load diff
        id: diff
        run: |
          if [ ! -f build/snapshot/diff.json ]; then
            echo "CHANGED=false" >> $GITHUB_ENV
            exit 0
          fi
          count=$(jq -r '.changes_count // 0' build/snapshot/diff.json 2>/dev/null || echo 0)
          if [ "${count:-0}" -ge 1 ] 2>/dev/null; then
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      # =========================
      # 전체 diff.json (용량 큼) — PR 본문 대신 아티팩트로 보관
      # =========================
      - name: Upload snapshot diff artifact
        if: env.CHANGED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diff
          path: build/snapshot/diff.json

      - name: Prepare diff summary (PR / 댓글용)
        if: env.CHANGED == 'true'
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Snapshot diff"
            echo ""
            echo "전체 \`diff.json\`은 이 워크플로 실행의 **Artifacts → snapshot-diff** 에서 받을 수 있습니다."
            echo ""
            echo "- Run: $RUN_URL"
            echo ""
            echo "### 요약"
            echo '```json'
            jq '{total, changes_count}' build/snapshot/diff.json
            echo '```'
            echo ""
            echo "### 변경 샘플 (최대 5건)"
            echo '```json'
            jq '.changes[0:5]' build/snapshot/diff.json
            echo '```'
          } > diff-summary.md

      # =========================
      # 2️⃣ Slack 알림
      # =========================
      - name: Slack notify (pretty)
        if: true #env.CHANGED == 'true'
        env:
          CPS_WEBHOOK_URL: ${{ secrets.CPS_WEBHOOK_URL }}
        run: |
          # 🔥 요약 정보만 추출
          COUNT=$(jq '.changes_count' build/snapshot/diff.json)

          SAMPLE=$(jq -c '.changes[:3]' build/snapshot/diff.json)

          PR_URL="${{ github.event.pull_request.html_url }}"
          if [ -z "$PR_URL" ]; then
            PR_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          PAYLOAD=$(jq -n \
            --arg pr "$PR_URL" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg count "$COUNT" \
            --arg sample "$SAMPLE" \
            '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📞 libphonenumber 변경 감지"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n\($repo)"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n\($actor)"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔢 변경 개수:* \($count)"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pull Request:*\n<\($pr)|바로가기>"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*📊 변경 일부 (최대 3개)*\n```json\n\($sample)\n```"
                  }
                }
              ]
            }')

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD"

          if [ -n "$CPS_WEBHOOK_URL" ]; then
            curl -X POST "$CPS_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "$PAYLOAD"
          fi
      # =========================
      # 3️⃣ PR 생성
      # =========================
      - name: Create PR
        if: env.CHANGED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: libphonenumber change detected"
          title: "🚨 libphonenumber change detected"
          body-path: diff-summary.md
          base: master
          delete-branch: true

      # =========================
      # 4️⃣ PR 댓글
      # =========================
      - name: PR comment
        if: github.event_name == 'pull_request' && env.CHANGED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('diff-summary.md', 'utf8');
            } catch (e) {
              body = 'diff-summary.md not found';
            }
            const max = 60000;
            if (body.length > max) {
              body = body.slice(0, max) + '\n\n…(truncated for GitHub API limit; see workflow artifacts for full diff)';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 libphonenumber change detected\n\n${body}`
            });