name: libphonenumber CI

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew
      - run: ./gradlew test

      # =========================
      # 1️⃣ diff 읽기
      # =========================
      - name: Load diff
        id: diff
        run: |
          if [ -f build/snapshot/diff.json ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      # =========================
      # 2️⃣ Slack 알림
      # =========================
      - name: Slack notify
        if: env.CHANGED == 'true'
        run: |
          MESSAGE=$(cat build/snapshot/diff.json)
          
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"🚨 libphonenumber 변경 감지\n\n$MESSAGE\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # =========================
      # 3️⃣ PR 생성
      # =========================
      - name: Create PR
        if: env.CHANGED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "libphonenumber change detected"
          body: "자동 생성 PR (diff.json 참고)"
          branch: auto/libphone-${{ github.run_id }}

      # =========================
      # 4️⃣ PR 댓글
      # =========================
      - name: PR comment
        if: github.event_name == 'pull_request' && env.CHANGED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('build/snapshot/diff.json', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚨 libphonenumber change detected\n\n```json\n" + diff + "\n```"
            });